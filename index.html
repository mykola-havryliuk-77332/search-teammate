<div id="auth-modal" class="modal-overlay">
        <div class="modal-box">
            <div class="auth-tabs">
                <button class="auth-tab active" id="tab-login" onclick="switchAuth('log')">Login</button>
                <button class="auth-tab" id="tab-register" onclick="switchAuth('reg')">Register</button>
            </div>
            
            <h2 id="auth-title">Welcome Back</h2>
            <p class="modal-subtitle" id="auth-subtitle">Login to access game lobbies</p>
            
            <form id="auth-form">
                <div class="input-group" id="nick-group" style="display: none;">
                    <label for="nickname">Nickname</label>
                    <input type="text" id="nickname" placeholder="e.g., Nick">
                </div>
                
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="example@mail.com" required>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                    <span id="error-msg" class="error-text"></span>
                </div>

                <button type="submit" class="submit-btn" id="submit-btn">Login & Enter</button>
            </form>
        </div>
    </div>
